            color: rgba(255, 255, 255, 0.2);

            const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
            document.getElementById('cpbFill').style.width = pct + '%';
            document.getElementById('cpbPct').textContent = pct + '%';
        }

        function loadProgress() {
            fetch('/api/progress')
                .then(r => r.json())
                .then(data => {
                    if (!data.success) return;
                    completedLessons = new Set(data.completed_lessons);
                    updateProgressBar(data.completed_lessons.length, data.total_lessons);
                    // Update all card visual states

                }).catch(() => { });

            const card = document.getElementById('card' + videoNumber);

                btn.className = 'btn-complete done';
                btn.innerHTML = '✅ Completed';
                btn.setAttribute('onclick', `unmarkLesson(${videoNumber})`);
            }

        function unmarkLesson(videoNumber) {
            fetch('/api/progress/' + videoNumber, { method: 'DELETE' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        completedLessons = new Set(data.completed_lessons);
                        updateProgressBar(data.completed_lessons.length, data.total_lessons);
                        markCardUndone(videoNumber);
                    }
                });
        }

        function showToastCourse(msg, type) {
            const t = document.getElementById('toastCourse');
            t.textContent = msg;
            t.className = 'toast-course ' + (type || '') + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ========== VIDEO CARD GENERATION ==========
        function generateVideoCards() {
            const videosGrid = document.getElementById('videosGrid');
            const totalVideos = embedUrls.length;

            for (let i = 0; i < totalVideos; i++) {
                const videoNumber = i + 3; // Start from video 3
                const videoCard = document.createElement('div');
                videoCard.className = 'video-card';
                videoCard.id = 'card' + videoNumber;
                videoCard.style.animationDelay = `${Math.min(i * 0.05, 2)}s`;

                videoCard.innerHTML = `
                    <div class="video-card-content">
                        <div class="video-header">
                            <div class="video-number">${videoNumber}</div>
                            <div class="video-info">
                                <h2 class="video-title">الدرس ${getArabicOrdinal(videoNumber)}</h2>
                                <div class="video-meta">
                                    <div class="meta-item">
                                        <span>📹</span>
                                        <span>Embedded Video</span>
                                    </div>
                                    <div class="meta-item">
                                        <span>🔒</span>
                                        <span>محمي من النسخ</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="video-player-wrapper">
                            <div class="video-watermark">🔒 ${USERNAME} - ID: ${USER_ID}</div>
                            <iframe 
                                id="video${videoNumber}" 
                                src="${embedUrls[i]}" 
                                frameborder="0" 
                                marginwidth="0" 
                                marginheight="0" 
                                scrolling="no" 
                                width="100%" 
                                height="400" 
                                allowfullscreen
                                style="border-radius: 12px; display: block; width: 100%;">
                            </iframe>
                        </div>

                        <div class="video-controls">
                            <button
                                id="completeBtn${videoNumber}"
                                class="btn-complete not-done"
                                onclick="markComplete(${videoNumber})">
                                ☑ Mark Complete
                            </button>
                        </div>
                    </div>
                `;

                videosGrid.appendChild(videoCard);
            }

            // After cards are created, load progress from server
            loadProgress();
        }


        function initializeVideoPlayers() {
            document.querySelectorAll('video').forEach(video => {
                const videoNum = video.id.replace('video', '');
                const progressBar = document.getElementById('progress' + videoNum);

                // Track progress
                video.addEventListener('timeupdate', function () {
                    const progress = (video.currentTime / video.duration) * 100;
                    if (progressBar) progressBar.style.width = progress + '%';
                });

                // Save/restore progress
                video.addEventListener('pause', () => {
                    localStorage.setItem(video.id + '_time', video.currentTime);
                });

                const savedTime = localStorage.getItem(video.id + '_time');
                if (savedTime) video.currentTime = parseFloat(savedTime);

                // Anti-piracy: disable right-click on video
                video.addEventListener('contextmenu', e => e.preventDefault());

                // Error handling
                video.addEventListener('error', function () {
                    const wrapper = video.closest('.video-player-wrapper');
                    if (wrapper && !wrapper.querySelector('.error-message')) {
                        const errorMsg = document.createElement('div');
                        errorMsg.className = 'error-message';
                        errorMsg.style.cssText = `
                            padding: 2rem;
                            text-align: center;
                            color: var(--text-secondary);
                            background: rgba(255, 255, 255, 0.03);
                            border-radius: 10px;
                        `;
                        errorMsg.innerHTML = `
                            <div style="font-size: 3rem; margin-bottom: 1rem;">📁</div>
                            <div>الفيديو غير متوفر حالياً</div>
                        `;
                        video.style.display = 'none';
                        wrapper.querySelector('.video-watermark').style.display = 'none';
                        wrapper.appendChild(errorMsg);
                    }
                });
            });
        }

        function togglePlay(videoId) {
            const video = document.getElementById(videoId);
            if (video.paused) video.play();
            else video.pause();
        }

        function toggleFullscreen(videoId) {
            const video = document.getElementById(videoId);
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            }
        }

        // Generate videos on page load
        window.addEventListener('DOMContentLoaded', generateVideoCards);

        // Security message
        console.log('%c⚠️ تحذير أمني', 'color: red; font-size: 30px; font-weight: bold;');
        console.log('%cهذا المحتوى محمي - أي محاولة للسرقة ستُسجل', 'color: orange; font-size: 16px;');
    </script>
</body>
